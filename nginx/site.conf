# nginx/site.conf
# 适用于单机多站点：全机只保留一个 Nginx，对外统一监听 80/443。
# 每个项目一个 server_name，各自反向代理到 127.0.0.1 的独立端口。
#
# 使用前替换以下占位值：
#   info.c.bimumedia.com
#   /srv/apps/info.c.bimumedia.com/current
#   /srv/data/info.c.bimumedia.com
#   /etc/nginx/ssl/info.c.bimumedia.com/fullchain.pem
#   /etc/nginx/ssl/info.c.bimumedia.com/privkey.pem
#   18081

upstream product_credential_site {
    server 127.0.0.1:18081;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name info.c.bimumedia.com;

    # 证书签发或续期时可放开 ACME 目录
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name info.c.bimumedia.com;

    ssl_certificate     /etc/nginx/ssl/info.c.bimumedia.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/info.c.bimumedia.com/privkey.pem;

    access_log /var/log/nginx/info.c.bimumedia.com.access.log;
    error_log  /var/log/nginx/info.c.bimumedia.com.error.log warn;

    client_max_body_size 16m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # 代码目录中的静态样式
    location /css/ {
        alias /srv/apps/info.c.bimumedia.com/current/css/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # 外置存储目录中的产品图与缩略图
    location /images/ {
        alias /srv/data/info.c.bimumedia.com/images/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # 外置存储目录中的 PDF 证书
    location /certificates/ {
        alias /srv/data/info.c.bimumedia.com/certificates/;
        add_header Content-Disposition inline;
        add_header X-Content-Type-Options nosniff;
        expires 7d;
    }

    # 后台相关接口当前仅保留应用内登录鉴权。
    # 如需恢复办公 IP 白名单，可在这里重新添加 allow/deny 规则。
    location ~ ^/(admin|login|logout)(/|$) {
        proxy_pass http://product_credential_site;
        proxy_read_timeout 30s;
    }

    location = /healthz {
        proxy_pass http://product_credential_site;
        access_log off;
    }

    location / {
        proxy_pass http://product_credential_site;
        proxy_read_timeout 30s;
    }
}
