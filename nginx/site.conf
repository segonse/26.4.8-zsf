# nginx/site.conf
# 部署时复制到 /etc/nginx/sites-available/ 并 symlink 到 sites-enabled
# sudo cp nginx/site.conf /etc/nginx/sites-available/product-credential
# sudo ln -s /etc/nginx/sites-available/product-credential /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 域名;  # 替换为实际域名

    # 重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 域名;  # 替换为实际域名

    # Let's Encrypt SSL 证书路径
    ssl_certificate /etc/letsencrypt/live/域名/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/域名/privkey.pem;

    # 静态资源直接由 Nginx 托管（性能优化，绕过 Node.js）
    root /var/www/product-credential-site;

    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # PDF 文件允许内联查看
    location ~* \.pdf$ {
        add_header Content-Disposition inline;
        add_header X-Content-Type-Options nosniff;
        expires 7d;
        try_files $uri =404;
    }

    # 后台管理路由仅限内网访问
    location /admin {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 其余请求代理到 Node.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
