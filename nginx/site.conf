# nginx/site.conf
# 部署时复制到 /etc/nginx/sites-available/ 并 symlink 到 sites-enabled
# sudo cp nginx/site.conf /etc/nginx/sites-available/product-credential
# sudo ln -s /etc/nginx/sites-available/product-credential /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 域名;  # 替换为实际域名

    # 重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 域名;  # 替换为实际域名

    # Let's Encrypt SSL 证书路径
    ssl_certificate /etc/letsencrypt/live/域名/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/域名/privkey.pem;

    # 网站根目录
    root /var/www/product-credential-site;
    index index.html;

    # 静态文件缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # PDF 文件允许内联查看（不强制下载）
    location ~* \.pdf$ {
        add_header Content-Disposition inline;
        add_header X-Content-Type-Options nosniff;
        expires 7d;
    }

    # 限制 admin.html 仅内网访问（团队内部使用）
    location = /admin.html {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # 默认路由：支持直接访问 .html 文件
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # 404 页面
    error_page 404 /index.html;
}
